<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Lung Power Test - วัดพลังปอด </title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Kanit', sans-serif; }
        .tree-container { position: relative; width: 100%; height: 400px; display: flex; justify-content: center; align-items: flex-end; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, #4ade80, #166534); border-radius: 100% 100% 0 0; }
        .trunk { position: absolute; bottom: 50px; width: 30px; background: linear-gradient(to right, #92400e, #b45309, #92400e); border-radius: 5px; transform-origin: bottom center; transition: height 0.3s ease-out; }
        .foliage { position: absolute; bottom: 80px; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease-out; }
        .leaf-layer { border-radius: 50%; transition: all 0.3s ease-out; }
        .leaf-layer-1 { background: radial-gradient(circle at 30% 30%, #86efac, #22c55e); box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1); }
        .leaf-layer-2 { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1); margin-top: -30%; }
        .leaf-layer-3 { background: radial-gradient(circle at 30% 30%, #22c55e, #15803d); box-shadow: inset -10px -10px 20px rgba(0,0,0,0.15); margin-top: -30%; }
        .flower { position: absolute; width: 12px; height: 12px; background: radial-gradient(circle, #fef08a, #facc15); border-radius: 50%; opacity: 0; transition: opacity 0.5s ease; }
        #countdown-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
            color: white; font-size: 150px; font-weight: bold;
        }
        .breath-meter { width: 100%; height: 25px; background: #e5e7eb; border-radius: 20px; overflow: hidden; border: 3px solid white; }
        .breath-fill { height: 100%; background: linear-gradient(to right, #fbbf24, #ef4444, #8b5cf6); border-radius: 20px; transition: width 0.1s ease-out; }
    </style>
</head>
<body class="h-full bg-gradient-to-b from-sky-300 via-sky-200 to-emerald-200 p-4 overflow-auto">
    
    <div id="countdown-overlay">3</div>

    <div class="max-w-xl mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-emerald-800 mb-2">🌬️ เครื่องวัดพลังปอดระเบิด</h1>
            <p class="text-emerald-700">วัดความแรงลมเป่า (เน้นระเบิดพลังครั้งเดียว)</p>
        </div>

        <div class="bg-white/50 backdrop-blur rounded-3xl p-6 mb-6 shadow-xl relative">
            <div class="tree-container">
                <div class="absolute top-4 left-8 text-4xl animate-bounce">☀️</div>
                <div class="trunk" id="trunk" style="height: 30px;"></div>
                <div class="foliage" id="foliage" style="opacity: 0;">
                    <div class="leaf-layer leaf-layer-3" style="width: 50px; height: 50px;"></div>
                    <div class="leaf-layer leaf-layer-2" style="width: 70px; height: 70px;"></div>
                    <div class="leaf-layer leaf-layer-1" style="width: 90px; height: 90px;"></div>
                    <div class="flower" style="top: 20%; left: 20%;"></div>
                    <div class="flower" style="top: 30%; right: 25%;"></div>
                </div>
                <div class="ground"></div>
            </div>
            <div class="mt-4">
                <div id="status-message" class="text-emerald-800 text-center text-xl font-bold mb-3 h-8 italic">เตรียมตัวให้พร้อม</div>
                <div class="breath-meter">
                    <div id="breath-fill" class="breath-fill" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div id="permission-container" class="bg-blue-50/90 rounded-2xl p-6 text-center shadow-lg">
            <h2 class="font-bold text-blue-800 mb-4 text-center">ต้องใช้ไมโครโฟนเพื่อวัดแรงเป่า</h2>
            <button id="permission-btn" class="w-full py-3 bg-blue-500 text-white font-bold rounded-xl">อนุญาตให้ใช้ไมค์</button>
        </div>

        <button id="start-btn" class="w-full py-5 bg-orange-500 text-white text-2xl font-black rounded-2xl shadow-lg hidden active:scale-95 transition-all"> 💨 เริ่มระเบิดพลัง! </button>

        <div id="results-panel" class="mt-6 bg-white/95 rounded-3xl p-6 hidden shadow-2xl border-4 border-emerald-400">
            <h3 class="text-2xl font-bold text-emerald-800 mb-4 text-center">📊 ผลการวิเคราะห์พลังปอด</h3>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-orange-50 rounded-2xl p-4 text-center">
                    <div class="text-4xl font-black text-orange-600" id="result-power">0%</div>
                    <div class="text-sm font-bold text-orange-800">พลังระเบิดลม</div>
                </div>
                <div class="bg-emerald-50 rounded-2xl p-4 text-center">
                    <div class="text-5xl font-black text-emerald-600" id="result-grade">-</div>
                    <div class="text-sm font-bold text-emerald-800">ระดับปอด</div>
                </div>
            </div>
            <div id="result-comparison" class="p-5 rounded-2xl text-center font-bold mb-6"></div>
            <button onclick="location.reload()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl text-xl"> 🔄 ทดสอบใหม่ </button>
        </div>
    </div>

    <script>
        let audioContext, analyser, microphone, isListening = false;
        let maxVolume = 0, totalVolume = 0, sampleCount = 0;
        let hasStartedBlowing = false, animationId = null, silenceTimer = null;

        const startBtn = document.getElementById('start-btn');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const statusMessage = document.getElementById('status-message');
        const trunk = document.getElementById('trunk');
        const foliage = document.getElementById('foliage');
        const breathFill = document.getElementById('breath-fill');

        document.getElementById('permission-btn').onclick = async () => {
            try {
                window.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('permission-container').classList.add('hidden');
                startBtn.classList.remove('hidden');
            } catch (err) { alert("กรุณาเปิดไมค์เพื่อใช้งาน"); }
        };

        startBtn.onclick = () => {
            startBtn.classList.add('hidden');
            countdownOverlay.style.display = 'flex';
            let count = 3;
            countdownOverlay.textContent = count;
            let timer = setInterval(() => {
                count--;
                if (count > 0) countdownOverlay.textContent = count;
                else if (count === 0) countdownOverlay.textContent = "เป่า!!!";
                else {
                    clearInterval(timer);
                    countdownOverlay.style.display = 'none';
                    startTest();
                }
            }, 1000);
        };

        function startTest() {
            isListening = true;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(window.micStream);
            microphone.connect(analyser);
            statusMessage.textContent = "🚀 พ่นลมออกมาให้แรงที่สุด!";
            update();
        }

        function update() {
            if (!isListening) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            const volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
            const normVol = Math.min(volume / 100, 1);
            breathFill.style.width = (normVol * 100) + "%";

            if (normVol > 0.15) {
                if (!hasStartedBlowing) {
                    hasStartedBlowing = true;
                    statusMessage.textContent = "🔥 กำลังระเบิดพลัง!";
                }
                clearTimeout(silenceTimer);
                silenceTimer = null;

                if (normVol > maxVolume) maxVolume = normVol;
                totalVolume += normVol;
                sampleCount++;

                // ต้นไม้โตตามความแรง
                let growthIncrement = normVol * 6; 
                let currentGrowth = parseFloat(trunk.style.height) - 30;
                let newGrowth = Math.min(currentGrowth + growthIncrement, 100);
                
                const h = 30 + (newGrowth * 1.5);
                trunk.style.height = h + "px";
                if (newGrowth > 5) foliage.style.opacity = 1;
                foliage.style.bottom = (50 + h - 30) + "px";
                foliage.style.transform = `scale(${0.5 + (newGrowth / 100)})`;
                if (newGrowth > 80) document.querySelectorAll('.flower').forEach(f => f.style.opacity = 1);

            } else if (hasStartedBlowing) {
                if (!silenceTimer) silenceTimer = setTimeout(finish, 600);
            }
            animationId = requestAnimationFrame(update);
        }

        function finish() {
            isListening = false;
            cancelAnimationFrame(animationId);
            
            const avgPower = sampleCount > 0 ? (totalVolume / sampleCount) : 0;
            // สูตร: แรงสุด 70% + เฉลี่ย 30% (เน้นความแรงเป็นหลัก)
            const finalScore = Math.round(((maxVolume * 0.7) + (avgPower * 0.3)) * 100);
            
            document.getElementById('results-panel').classList.remove('hidden');
            document.getElementById('result-power').textContent = finalScore + "%";
            
            const grade = document.getElementById('result-grade');
            const comp = document.getElementById('result-comparison');
            
            if (finalScore >= 80) {
                grade.textContent = "A+";
                comp.innerHTML = "🏆 ปอดเหล็กไฟ!<br><span class='font-normal text-sm'>พลังเป่ามหาศาล หลอดลมกว้างและยืดหยุ่นดีเยี่ยมเหมือนนักกีฬา</span>";
                comp.className = "p-5 rounded-2xl text-center font-bold mb-6 bg-green-100 text-green-700";
            } else if (finalScore >= 60) {
                grade.textContent = "B";
                comp.innerHTML = "✅ ปอดคนปกติ<br><span class='font-normal text-sm'>สุขภาพดีตามมาตรฐาน แต่ถ้าออกกำลังกายสม่ำเสมอจะเป่าได้แรงกว่านี้</span>";
                comp.className = "p-5 rounded-2xl text-center font-bold mb-6 bg-blue-100 text-blue-700";
            } else if (finalScore >= 40) {
                grade.textContent = "C";
                comp.innerHTML = "🚬 ปอดสำลักควัน<br><span class='font-normal text-sm'>แรงเป่าค่อนข้างแผ่ว เป็นเกณฑ์ที่พบในคนเริ่มสูบบุหรี่หรือขาดการออกกำลังกาย</span>";
                comp.className = "p-5 rounded-2xl text-center font-bold mb-6 bg-orange-100 text-orange-700";
            } else {
                grade.textContent = "F";
                comp.innerHTML = "⚠️ ปอดพังทลาย<br><span class='font-normal text-sm'>ลมหายใจแผ่วมาก เสี่ยงต่อถุงลมโป่งพองหรือสูบบุหรี่จัด ควรปรึกษาแพทย์</span>";
                comp.className = "p-5 rounded-2xl text-center font-bold mb-6 bg-red-100 text-red-700";
            }
            statusMessage.textContent = "วิเคราะห์เรียบร้อย!";
        }
    </script>
</body>
</html>
