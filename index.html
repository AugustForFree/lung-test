<!DOCTYPE html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปลูกปอด (beta) - วัดสมรรถภาพปอดของคุณ</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Kanit', sans-serif; }
        .tree-container { position: relative; width: 100%; height: 350px; display: flex; justify-content: center; align-items: flex-end; }
        .ground { position: absolute; bottom: 0; width: 100%; height: 50px; background: linear-gradient(to bottom, #4ade80, #166534); border-radius: 100% 100% 0 0; }
        .trunk { position: absolute; bottom: 45px; width: 25px; background: linear-gradient(to right, #92400e, #b45309, #92400e); border-radius: 5px; transform-origin: bottom center; transition: height 0.3s ease-out; }
        .foliage { position: absolute; bottom: 70px; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease-out; }
        .leaf-layer { border-radius: 50%; transition: all 0.3s ease-out; }
        .leaf-layer-1 { background: radial-gradient(circle at 30% 30%, #86efac, #22c55e); box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1); }
        .leaf-layer-2 { background: radial-gradient(circle at 30% 30%, #4ade80, #16a34a); box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1); margin-top: -25%; }
        .leaf-layer-3 { background: radial-gradient(circle at 30% 30%, #22c55e, #15803d); box-shadow: inset -5px -5px 15px rgba(0,0,0,0.15); margin-top: -25%; }
        #countdown-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;
            color: white; font-size: 150px; font-weight: bold; pointer-events: none;
        }
        .mode-card { transition: all 0.3s ease; cursor: pointer; }
        .mode-card:hover { transform: translateY(-8px); filter: brightness(1.05); }
        .beta-badge { font-size: 0.4em; vertical-align: middle; background: #fbbf24; color: #78350f; padding: 2px 10px; border-radius: 12px; margin-left: 8px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full bg-gradient-to-b from-sky-300 via-sky-200 to-emerald-200 p-4 overflow-auto">
    
    <div id="countdown-overlay">3</div>

    <div class="max-w-xl mx-auto py-6">
        
        <div id="menu-screen" class="space-y-6 animate-fade-in">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-black text-emerald-800 mb-2">ปลูกปอด <span class="beta-badge">beta</span></h1>
                <p class="text-emerald-700 text-lg font-medium">เป่าให้แรง แข็งแรงให้จริง</p>
            </div>

            <div onclick="initMode('power')" class="mode-card bg-white/90 p-6 rounded-3xl shadow-xl border-l-8 border-orange-500 flex items-center gap-6">
                <div class="text-5xl">🔥</div>
                <div>
                    <h2 class="text-2xl font-bold text-orange-600">โหมดระเบิดพลัง</h2>
                    <p class="text-gray-600 text-sm">วัดความแรงลมเป่าสูงสุด (เน้นพ่นลมแรงครั้งเดียว)</p>
                </div>
            </div>

            <div onclick="initMode('endurance')" class="mode-card bg-white/90 p-6 rounded-3xl shadow-xl border-l-8 border-blue-500 flex items-center gap-6">
                <div class="text-5xl">⏳</div>
                <div>
                    <h2 class="text-2xl font-bold text-blue-600">โหมดอึดทะลุโลก</h2>
                    <p class="text-gray-600 text-sm">วัดความนาน (เน้นเป่าประคองลมให้นานที่สุด)</p>
                </div>
            </div>

            <div id="permission-box" class="mt-8 p-4 bg-emerald-50 rounded-2xl border border-emerald-200 text-center shadow-inner">
                <p class="text-emerald-800 text-sm mb-3">แอปต้องใช้ไมโครโฟนเพื่อวัดแรงลม</p>
                <button id="mic-btn" class="px-8 py-2 bg-emerald-500 text-white font-bold rounded-full hover:bg-emerald-600 transition-colors shadow-md">🎤 อนุญาตการใช้ไมค์</button>
            </div>
        </div>

        <div id="test-screen" class="hidden animate-fade-in">
            <button onclick="location.reload()" class="mb-4 text-emerald-700 font-bold flex items-center gap-2"> ⬅️ กลับหน้าเมนู </button>
            
            <div class="bg-white/50 backdrop-blur rounded-3xl p-6 mb-6 shadow-xl relative text-center border-2 border-white">
                <div class="tree-container">
                    <div class="trunk" id="trunk" style="height: 30px;"></div>
                    <div class="foliage" id="foliage" style="opacity: 0;">
                        <div class="leaf-layer leaf-layer-3" style="width: 50px; height: 50px;"></div>
                        <div class="leaf-layer leaf-layer-2" style="width: 70px; height: 70px;"></div>
                        <div class="leaf-layer leaf-layer-1" style="width: 90px; height: 90px;"></div>
                    </div>
                    <div class="ground"></div>
                </div>
                <div class="mt-4">
                    <div id="status-message" class="text-emerald-800 text-center text-xl font-bold mb-3 h-8">เตรียมเป่า...</div>
                    <div class="w-full h-5 bg-gray-200 rounded-full overflow-hidden border-2 border-white shadow-inner">
                        <div id="breath-fill" class="h-full bg-gradient-to-r from-yellow-400 via-orange-500 to-red-600 transition-all duration-75" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
            <button id="action-btn" class="w-full py-5 text-white text-2xl font-black rounded-2xl shadow-lg active:scale-95 transition-all">เริ่มทดสอบ!</button>
        </div>

        <div id="result-screen" class="hidden animate-fade-in">
            <div class="bg-white/95 rounded-3xl p-8 shadow-2xl border-4 border-emerald-400 text-center">
                <h3 class="text-2xl font-bold text-emerald-800 mb-6">สรุปผลการ "ปลูกปอด"</h3>
                <div class="flex justify-center gap-4 mb-8">
                    <div class="bg-orange-50 p-4 rounded-2xl w-1/2 shadow-inner">
                        <div id="final-value" class="text-4xl font-black text-orange-600">0</div>
                        <div id="final-unit" class="text-xs font-bold text-orange-800 uppercase tracking-widest">หน่วย</div>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-2xl w-1/2 shadow-inner">
                        <div id="final-grade" class="text-5xl font-black text-emerald-600">-</div>
                        <div class="text-xs font-bold text-emerald-800 uppercase tracking-widest">เกรดปอด</div>
                    </div>
                </div>
                <div id="result-desc" class="p-6 rounded-2xl font-bold mb-8 text-lg border-2"></div>
                <button onclick="location.reload()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl text-xl shadow-lg active:scale-95 transition-all"> 🔄 ทดสอบใหม่อีกครั้ง </button>
            </div>
        </div>
    </div>

    <script>
        let currentMode = '';
        let audioContext, analyser, microphone, isListening = false;
        let maxPower = 0, totalPower = 0, samples = 0, startTime = null, duration = 0;
        let hasStarted = false, animationId = null, silenceTimer = null;

        const micBtn = document.getElementById('mic-btn');
        const actionBtn = document.getElementById('action-btn');

        micBtn.onclick = async () => {
            try {
                window.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('permission-box').innerHTML = "<span class='text-emerald-600 font-bold text-lg'>✅ ไมโครโฟนพร้อมใช้งาน!</span>";
            } catch (err) { alert("กรุณาอนุญาตเข้าถึงไมค์ครับ"); }
        };

        function initMode(mode) {
            if (!window.micStream) return alert("กรุณากด 'อนุญาตการใช้ไมค์' ก่อนครับ!");
            currentMode = mode;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            document.getElementById('status-message').textContent = mode === 'power' ? "โหมด: ระเบิดพลัง 🚀" : "โหมด: อึดทะลุโลก ⏳";
            actionBtn.className = `w-full py-5 text-white text-2xl font-black rounded-2xl shadow-lg active:scale-95 transition-all ${mode === 'power' ? 'bg-orange-500' : 'bg-blue-500'}`;
        }

        actionBtn.onclick = () => {
            actionBtn.classList.add('hidden');
            const overlay = document.getElementById('countdown-overlay');
            overlay.style.display = 'flex';
            let c = 3; overlay.textContent = c;
            let t = setInterval(() => {
                c--;
                if (c > 0) overlay.textContent = c;
                else if (c === 0) overlay.textContent = "เป่า!!!";
                else { clearInterval(t); overlay.style.display = 'none'; startTest(); }
            }, 1000);
        };

        function startTest() {
            isListening = true; hasStarted = false;
            maxPower = 0; totalPower = 0; samples = 0; duration = 0;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(window.micStream);
            microphone.connect(analyser);
            update();
        }

        function update() {
            if (!isListening) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            const vol = (data.reduce((a, b) => a + b) / data.length) / 100;
            const normVol = Math.min(vol, 1);
            document.getElementById('breath-fill').style.width = (normVol * 100) + "%";

            const threshold = currentMode === 'power' ? 0.15 : 0.05;

            if (normVol > threshold) {
                if (!hasStarted) {
                    hasStarted = true;
                    startTime = Date.now();
                }
                clearTimeout(silenceTimer); silenceTimer = null;

                if (currentMode === 'power') {
                    if (normVol > maxPower) maxPower = normVol;
                    totalPower += normVol; samples++;
                    document.getElementById('status-message').textContent = "🔥 พ่นลมออกมา!!";
                    growTree(normVol * 7);
                } else {
                    duration = (Date.now() - startTime) / 1000;
                    document.getElementById('status-message').textContent = `⏳ เวลาเป่า: ${duration.toFixed(1)} วิ`;
                    growTree(0.8);
                }
            } else if (hasStarted) {
                if (!silenceTimer) silenceTimer = setTimeout(finish, currentMode === 'power' ? 600 : 1000);
            }
            animationId = requestAnimationFrame(update);
        }

        function growTree(amt) {
            const trunk = document.getElementById('trunk');
            const foliage = document.getElementById('foliage');
            let currH = parseFloat(trunk.style.height) - 30;
            let nextH = Math.min(currH + amt, 100);
            let h = 30 + (nextH * 1.5);
            trunk.style.height = h + "px";
            if (nextH > 5) foliage.style.opacity = 1;
            foliage.style.bottom = (45 + h - 30) + "px";
            foliage.style.transform = `scale(${0.5 + (nextH / 100)})`;
        }

        function finish() {
            isListening = false; cancelAnimationFrame(animationId);
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const val = document.getElementById('final-value');
            const unit = document.getElementById('final-unit');
            const grade = document.getElementById('final-grade');
            const desc = document.getElementById('result-desc');

            if (currentMode === 'power') {
                const score = Math.round(((maxPower * 0.7) + ((totalPower/samples) * 0.3)) * 100);
                val.textContent = score; unit.textContent = "พลังลม (%)";
                if (score >= 80) { 
                    grade.textContent = "A+"; 
                    desc.innerHTML = "🏆 ปอดเหล็กไฟ!<br><span class='font-normal text-sm'>พลังระเบิดมหาศาล เหมือนคนไม่เคยแตะบุหรี่ หลอดลมสะอาดมาก</span>"; 
                    desc.className = "p-6 rounded-2xl bg-green-100 text-green-700 border-green-300"; 
                } else if (score >= 45) { 
                    grade.textContent = "B"; 
                    desc.innerHTML = "✅ ปอดปกติ<br><span class='font-normal text-sm'>อยู่ในเกณฑ์คนสุขภาพดีทั่วไป ออกกำลังกายเพิ่มจะฟิตกว่านี้</span>"; 
                    desc.className = "p-6 rounded-2xl bg-blue-100 text-blue-700 border-blue-300"; 
                } else { 
                    grade.textContent = "C"; 
                    desc.innerHTML = "🚬 ปอดสำลักควัน<br><span class='font-normal text-sm'>แรงเป่าแผ่ว มักพบในคนสูบบุหรี่หรือคนที่มีภาวะหลอดลมตีบ</span>"; 
                    desc.className = "p-6 rounded-2xl bg-orange-100 text-orange-700 border-orange-300"; 
                }
            } else {
                const score = duration.toFixed(1);
                val.textContent = score; unit.textContent = "วินาที";
                if (score >= 18) { 
                    grade.textContent = "S"; 
                    desc.innerHTML = "🧘‍♂️ เทพแห่งความอึด!<br><span class='font-normal text-sm'>ความจุอากาศในปอดดีเยี่ยม ลมหายใจยาวและแข็งแรงมาก</span>"; 
                    desc.className = "p-6 rounded-2xl bg-green-100 text-green-700 border-green-300"; 
                } else if (score >= 10) { 
                    grade.textContent = "A"; 
                    desc.innerHTML = "✅ ความอึดปกติ<br><span class='font-normal text-sm'>สุขภาพปอดแข็งแรงดี ทำกิจกรรมต่างๆ ได้คล่องตัว</span>"; 
                    desc.className = "p-6 rounded-2xl bg-blue-100 text-blue-700 border-blue-300"; 
                } else { 
                    grade.textContent = "F"; 
                    desc.innerHTML = "⚠️ ปอดแผ่วปลาย<br><span class='font-normal text-sm'>กลั้นลมได้น้อย เสี่ยงต่อภาวะถุงลมล้า ซึ่งอาจมาจากบุหรี่</span>"; 
                    desc.className = "p-6 rounded-2xl bg-red-100 text-red-700 border-red-300"; 
                }
            }
        }
    </script>
</body>
</html>
</html>
